      completed_at:
        type: string
      error:
        type: string
      jadx_status:
        type: string
      job_id:
        type: string
      mobsf_status:
        type: string
      package_name:
        type: string
      sha256:
        type: string
      source:
        type: string
      status:
        type: string
      submitted_at:
        type: string
      version:
        type: string
    type: object
  api.ListJobsResponse:
    properties:
      jobs:
        items:
          $ref: '#/definitions/api.JobSummary'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  api.MetaInfo:
    properties:
      activities:
        items:
          type: string
        type: array
      min_sdk:
        type: integer
      package_name:
        type: string
      permissions:
        items:
          type: string
        type: array
      receivers:
        items:
          type: string
        type: array
      services:
        items:
          type: string
        type: array
      target_sdk:
        type: integer
      version:
        type: string
      version_code:
        type: integer
    type: object
  api.MobSFInfo:
    properties:
      report: {}
      status:
        type: string
    type: object
  api.ResultsResponse:
    properties:
      apktool:
        $ref: '#/definitions/api.ToolInfo'
      jadx:
        $ref: '#/definitions/api.ToolInfo'
      job_id:
        type: string
      metadata:
        $ref: '#/definitions/api.MetaInfo'
      mobsf:
        $ref: '#/definitions/api.MobSFInfo'
      package_name:
        type: string
      results_path:
        type: string
      status:
        type: string
    type: object
  api.SearchMatch:
    properties:
      context:
        type: string
      file:
        type: string
