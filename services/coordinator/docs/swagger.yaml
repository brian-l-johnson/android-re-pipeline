host: coordinator.apps.blj.wtf
info:
  contact: {}
  description: Tracks analysis jobs and serves decompiled APK results.
  title: Android RE Pipeline — Coordinator API
  version: "1.0"
paths:
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /jobs:
    get:
      description: Returns a paginated list of analysis jobs ordered by submission
        time descending
      parameters:
      - description: Maximum number of results (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ListJobsResponse'
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all jobs
      tags:
      - jobs
  /results/{job_id}:
    get:
      description: Returns analysis results for a completed job, including tool outputs
        and APK metadata
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ResultsResponse'
        "400":
          description: invalid job_id
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: job not complete
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get job results
      tags:
      - jobs
  /results/{job_id}/download:
    get:
      description: Streams the complete output directory for a completed job as a
        zip (default) or tar.gz archive
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      - description: 'Archive format: zip (default) or tar.gz'
        in: query
        name: format
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: Archive file
          schema:
            type: file
        "400":
          description: invalid job_id or format
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: job not found or no results
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: jadx/apktool not complete
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download job results as archive
      tags:
      - jobs
  /results/{job_id}/file:
    get:
      description: 'Returns the contents of a file within the job''s output directory.
        Files larger than 100 KB are truncated; the X-Truncated: true header is set
        in that case.'
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      - description: Relative file path within the output directory
        in: query
        name: path
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: File contents
          schema:
            type: string
        "400":
          description: invalid job_id or path
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: file not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Retrieve a file from job output
      tags:
      - jobs
  /results/{job_id}/search:
    get:
      description: Performs a substring search across .java, .smali, .xml, and .json
        files in the job's output directory
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      - description: Search query string
        in: query
        name: q
        required: true
        type: string
      - description: Maximum number of results (default 50, max 200)
        in: query
        name: max
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SearchResponse'
        "400":
          description: invalid job_id or missing query
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search within job output files
      tags:
      - jobs
  /results/{job_id}/tree:
    get:
      description: Lists files and subdirectories under the job's output directory
        at the given relative path
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      - description: Relative path within the output directory
        in: query
        name: path
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TreeResponse'
        "400":
          description: invalid job_id or path
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: path not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List directory tree
      tags:
      - jobs
  /status/{job_id}:
    get:
      description: Returns the current status of an analysis job
      parameters:
      - description: Job UUID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StatusResponse'
        "400":
          description: invalid job_id
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get job status
      tags:
      - jobs
swagger: "2.0"
