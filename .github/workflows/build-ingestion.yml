name: Build ingestion image

on:
  push:
    branches:
      - main
    paths:
      - "services/ingestion/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/ingestion/go.sum

      - name: Run tests
        working-directory: services/ingestion
        run: go test ./...

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/ingestion/
          file: services/ingestion/Dockerfile
          push: true
          tags: |
            ghcr.io/brian-l-johnson/re-ingestion:${{ github.sha }}
            ghcr.io/brian-l-johnson/re-ingestion:latest
